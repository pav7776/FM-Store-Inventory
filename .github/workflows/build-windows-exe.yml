name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Store Inventory Management" fm_inventory_sqlite_app_v14_batch_expiry.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Store-Inventory-Management-Windows-EXE
          path: dist/Store Inventory Management.exe
